version: '3.8'

services:
  postgres:
    image: postgres:15
    environment:
      POSTGRES_USER: secondbrain
      POSTGRES_PASSWORD: secretpassword
      POSTGRES_DB: secondbrain
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U secondbrain"]
      interval: 10s
      timeout: 5s
      retries: 5

  server:
    build:
      context: ./server
    ports:
      - "5000:5000"
    environment:
      - DATABASE_URL=postgresql://secondbrain:secretpassword@postgres:5432/secondbrain?schema=public
      - JWT_SECRET=thisisasupersecretjwtsecretkeyformyapp12345
      - FRONTEND_ORIGINS=http://localhost:80, http://localhost:5173
      - PORT=5000
    volumes:
      - server_uploads:/app/uploads
    depends_on:
      postgres:
        condition: service_healthy

  client:
    build:
      context: ./client
    ports:
      - "80:80"
    depends_on:
      - server

volumes:
  postgres_data:
  server_uploads:
